# ROCm/AMD environment — single source of truth.
#
# Read by:
#   stable_audio_tools/rocm_env.py  -> apply_profile("inference")  (on package import)
#   scripts/train_latch.py          -> apply_profile("training")
# both BEFORE `import torch`. Values use setdefault, so anything you export in
# the shell still wins. Override the file location with SAT_ROCM_ENV_YAML.

tunings_root: /home/kim/pytorch-tunings-7.2.3

# Applied in every profile.
common:

  PYTORCH_TUNABLEOP_ENABLED: "1"
  PYTORCH_TUNABLEOP_VERBOSE: "1"
  PYTORCH_TUNABLEOP_FILENAME: "${tunings_root}/tunableop_results.csv"
  PYTORCH_SDP_KERNEL_VERBOSE: "1"
  # PYTORCH_ALLOC_CONF: "garbage_collection_threshold:0.6,max_split_size_mb:512"
  PYTORCH_HIP_ALLOC_CONF: "expandable_segments:True"
  PYTORCH_HIP_FREE_MEMORY_THRESHOLD_MB: "1024"
  HIP_FORCE_DEV_KERNARG: "1"
  FLASH_ATTENTION_TRITON_AMD_ENABLE: "TRUE"
  TRITON_CACHE_DIR: "${tunings_root}/triton_cache"
  MIOPEN_CUSTOM_CACHE_DIR: "${tunings_root}/miopen/cache"
  MIOPEN_USER_DB_PATH: "${tunings_root}/miopen/db"
  # torch.compile / Inductor — persistent FX-graph cache across runs (like MIOpen/TunableOp).
  # Off-by-default at the script level (--compile flag opts in), but cache dir is always set
  # so compiled graphs are reused once a head opts in.
  TORCHINDUCTOR_FX_GRAPH_CACHE: "1"
  TORCHINDUCTOR_CACHE_DIR: "${tunings_root}/inductor_cache"
  # Triton's AMD backend needs a C compiler for the driver shim. Pin absolute path
  # so this works regardless of PATH (e.g. minimal sandboxed shells).
  CC: "/usr/bin/gcc"
  OMP_NUM_THREADS: "8"
  TRITON_PRINT_AUTOTUNING: "1"

profiles:
  # Fast MIOpen lookup — for the gradio UI / generation.
  inference:
    MIOPEN_FIND_MODE: "2"            # FAST
    PYTORCH_TUNABLEOP_TUNING: "1"    # tune on miss + write CSV
  # Long runs — best steady-state perf.
  training:
    MIOPEN_FIND_MODE: "3"            # TRUST_VERIFY
    PYTORCH_TUNABLEOP_TUNING: "1"    # tune on miss + write CSV
