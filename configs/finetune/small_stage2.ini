; Stage 2 — ARC (Adversarial Rectified Flow Consistency) distillation of the
; Stage-1 finetune. Generator AND discriminator both initialise from Stage 1
; output. Produces the fast few-step inference checkpoint.
;
; Both `pretrained_ckpt_path` (below) AND `arc.discriminator_base_ckpt`
; (inside small_stage2_model_config.json) get sed-patched by
; run-sa-finetune.sh to point at the Stage 1 output. If running by hand,
; replace STAGE1_CKPT_PLACEHOLDER in both files with the unwrapped Stage 1 ckpt.
;
; NOTE: prefigure's --config-file REPLACES defaults.ini entirely (no merge),
; so this [DEFAULTS] block must carry every key train.py reads.

[DEFAULTS]
name                            = sa_small_stage2
project                         = sa-small-goa
logger                          = wandb

; Patched by run-sa-finetune.sh at launch time to the unwrapped Stage 1 ckpt.
pretrained_ckpt_path            = STAGE1_CKPT_PLACEHOLDER
pretransform_ckpt_path          =
remove_pretransform_weight_norm =
ckpt_path                       =

model_config                    = configs/finetune/small_stage2_model_config.json
dataset_config                  = configs/finetune/small_finetune_dataset.json
val_dataset_config              =
save_dir                        =

; Trainer
batch_size                      = 8
num_workers                     = 6
precision                       = bf16-mixed
strategy                        = auto
num_nodes                       = 1
seed                            = 42
accum_batches                   = 16
gradient_clip_val               = 1.0
checkpoint_every                = 5000
save_top_k                      = 3
val_every                       = -1
; -1 = train unbounded. Set small (e.g. 256) for a short tuning burst (see stage1.ini).
max_steps                       = -1

; torch.compile (Inductor) on the DiT — opt-in; capital-F so it parses as a bool.
compile                         = False
compile_mode                    = default
