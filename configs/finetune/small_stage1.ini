; Stage 1 — finetune SA Open Small's rectified-flow base model on the
; Goa-Trance 25% subset with the new global conditioners. Outputs an
; unwrapped checkpoint that Stage 2 will consume as both its starting
; weights AND its ARC discriminator base.
;
; Launch via:
;     bash run-sa-finetune.sh stage1
; or directly:
;     python3 train.py --config-file configs/finetune/small_stage1.ini
;
; NOTE: prefigure's --config-file REPLACES defaults.ini entirely (no merge),
; so this [DEFAULTS] block must carry every key train.py reads. Missing keys
; surface as `AttributeError: 'Namespace' object has no attribute '...'`.
; Override anything from the CLI: e.g. --batch-size 4 --num-workers 8.

[DEFAULTS]
name                            = sa_small_stage1
project                         = sa-small-goa
logger                          = wandb

; Start from the upstream rectified-flow base, not the ARC-distilled model.ckpt.
pretrained_ckpt_path            = models/checkpoints/small/base_model.ckpt
pretransform_ckpt_path          =
remove_pretransform_weight_norm =
ckpt_path                       =

model_config                    = configs/finetune/small_stage1_model_config.json
dataset_config                  = configs/finetune/small_finetune_dataset.json
val_dataset_config              =
save_dir                        =

; Trainer
batch_size                      = 8
num_workers                     = 6
precision                       = bf16-mixed
strategy                        = auto
num_nodes                       = 1
seed                            = 42
accum_batches                   = 16
gradient_clip_val               = 1.0
checkpoint_every                = 5000
save_top_k                      = 3
val_every                       = -1
; -1 = train unbounded. Set small (e.g. 256) for a short tuning burst: the run
; gets past the step-1 TunableOp/Triton tuning storm, then exits cleanly and
; writes the tuning CSV. Repeat until a burst finds nothing left to tune, then
; set back to -1 for the real run (tuning is cached, no more GPU-hammering spike).
max_steps                       = -1

; torch.compile (Inductor) on the DiT. NOTE: prefigure hardcodes default=False
; for booleans and ignores this value — pass --compile on the CLI to enable
; (run-sa-finetune.sh stage1 does). compile_mode IS read from here.
compile                         = False
compile_mode                    = default
