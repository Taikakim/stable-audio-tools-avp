# LatCH training config for rhythm features (beat/downbeat/onsets activations).
# Loss auto-selects bce_logits; test uses beat_grid with BPM targets.
# Run: python scripts/train_latch.py --config latch_train_rhythm.yaml --feature beat_activations

feature: beat_activations      # overridden per run with --feature
objective: rectified_flow
epochs: 30
lr: 3.0e-4
batch_size: 64
num_workers: 10
val_frac: 0.02
tag: v2
save_dir: latch_weights
latent_dir: /run/media/kim/Lehto/latents

# ROCm/AMD env: deferred to rocm_env.yaml's `training` profile (single source of
# truth). train_latch.py applies it before importing torch when no `amd:` section
# is present here — keeps this config version-agnostic (no stale tunings path).

wandb: true
wandb_project: latch
tensorboard: false

test:
  model_config: models/checkpoints/small/base_model_config.json
  ckpt_path:    models/checkpoints/small/base_model.ckpt
  every_epochs: 5
  steps: 50
  prompt: "trippy 124BPM acid techno, dry snappy kick and bassline, korg, roland, impactful, modular, eurorack, aggressive, syncopated"
  seed: 42
  cfg_scale: 3.0
  kind: beat_grid             # target value = BPM; places beat activations on the grid
  target_value: [90, 124, 160]  # BPM bracket -> one test clip per tempo
  window: [0.4, 1.0]
  gain: 8.0
  gamma: 0.3
  n_iter: 6
  weight: 5.0
